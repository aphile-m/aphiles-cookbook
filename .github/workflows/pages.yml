name: Deploy website (GitHub Pages)

# Publishes www/ as the installable web app at
# https://aphile-m.github.io/aphiles-cookbook/ . Runs on every push to main
# that touches the web app, and can be run manually.

on:
  push:
    branches: [main]
    paths:
      - 'www/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # turn Pages on automatically if it isn't already
      - name: Upload www as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: www
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
